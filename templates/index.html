<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Password Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container">
        <header>
            <h1>Vault<span>Safe</span></h1>
            <p>Your Personal Password Manager</p>
        </header>

        <div class="dashboard">
            <div class="card add-password-card">
                <h2>Add New Password</h2>
                <form id="add-form">
                    <div class="input-group">
                        <label for="website">Website / App Name</label>
                        <input type="text" id="website" placeholder="e.g. Google, Spotify" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="password" placeholder="Enter or generate" required>
                            <button type="button" id="btn-toggle-vis" class="btn-icon" title="Toggle Visibility">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                            <button type="button" id="btn-generate" class="btn-icon" title="Generate Secure Password">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l3-9 5 18 3-9h5"/></svg>
                            </button>
                            <button type="button" id="btn-copy" class="btn-icon" title="Copy Password">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </button>
                        </div>
                        <div class="strength-meter-container">
                            <div class="strength-meter-bar" id="strength-bar"></div>
                        </div>
                        <div class="strength-text" id="strength-text"></div>
                    </div>
                    
                    <button type="submit" class="btn-primary">Save Password</button>
                </form>
            </div>

            <div class="card view-passwords-card">
                <h2>Your Saved Passwords</h2>
                <div class="search-box">
                    <input type="text" id="search-passwords" placeholder="Search saved websites...">
                </div>
                <div id="passwords-list" class="passwords-list">
                    <div class="loading">Loading passwords...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
